<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhyGraph viewer</title>
  <style>{{STYLE_CSS}}</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">WhyGraph</div>
    <nav class="tabs">
      <button class="tab active" data-tab="graph">Graph</button>
      <button class="tab" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="authors">Authors</button>
    </nav>
    <div class="search">
      <input id="search" type="text" placeholder="Filter symbols by name…" autocomplete="off">
    </div>
    <div class="level-control" role="group" aria-label="Hierarchy level">
      <span class="level-label">View:</span>
      <button class="level-btn active" data-level="1" type="button"><span class="level-dot" data-level="1"></span>Modules</button>
      <button class="level-btn" data-level="2" type="button"><span class="level-dot" data-level="2"></span>+ Classes</button>
      <button class="level-btn" data-level="3" type="button"><span class="level-dot" data-level="3"></span>+ Methods</button>
      <button class="level-btn" data-level="4" type="button"><span class="level-dot" data-level="4"></span>Everything</button>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <main>
    <section id="view-graph" class="view active">
      <div id="cy"></div>
      <aside id="detail" class="detail empty">
        <div class="empty-state">Click a node to see contributors, evidence, and rationale.</div>
      </aside>
    </section>

    <section id="view-dashboard" class="view">
      <div class="dashboard"></div>
    </section>

    <section id="view-authors" class="view">
      <div class="authors-layout">
        <ul class="authors-list" id="authors-list"></ul>
        <aside class="author-detail empty" id="author-detail">
          <div class="empty-state">Pick an author to see recent activity.</div>
        </aside>
      </div>
    </section>
  </main>

  <script id="whygraph-data" type="application/json">{{DATA}}</script>
  <script>{{CYTOSCAPE_JS}}</script>
  <script>{{APP_JS}}</script>
</body>
</html>
