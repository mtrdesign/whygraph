# Alembic configuration for WhyGraph's SQLModel layer.
#
# The DB URL is *not* configured here — env.py routes through
# whygraph.db.get_engine() so the path comes from whygraph.core.get_config()
# (and ultimately from whygraph.toml). The sqlalchemy.url placeholder
# below exists only because Alembic requires the key to be present;
# env.py ignores it.

[alembic]
script_location = src/whygraph/db/migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url = sqlite:///placeholder-overridden-by-env.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
